<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="55%" stop-color="#0d1424"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="45%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.9"/>
    </linearGradient>

    <radialGradient id="glowSpot" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4f7cff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4f7cff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono { font-family: 'Cascadia Code','Fira Code',Consolas,monospace; }
      .sans { font-family: 'Segoe UI',Arial,sans-serif; }
      .dim  { fill:#64748b; }
      .accent { fill:#5eead4; }
      .pill-text { fill:#c7d2fe; font-size:15px; font-weight:600; }
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="300" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="300" rx="18" fill="url(#glowSpot)"/>

  <!-- animated gradient border -->
  <rect x="2" y="2" width="1196" height="296" rx="16" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- faint circuit grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="75" x2="1200" y2="75"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
  </g>

  <!-- floating particles -->
  <g fill="#7dd3fc">
    <circle cx="90" cy="50" r="2"><animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="60" r="2"><animate attributeName="opacity" values="1;0;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="240" r="2.5"><animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="250" r="2"><animate attributeName="opacity" values="1;0;1" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="150" r="1.8"><animate attributeName="opacity" values="0;1;0" dur="2.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- corner brackets, editor-style -->
  <g stroke="#5eead4" stroke-width="2.5" fill="none" opacity="0.8">
    <path d="M30,40 L30,20 L50,20"/>
    <path d="M1170,40 L1170,20 L1150,20"/>
    <path d="M30,260 L30,280 L50,280"/>
    <path d="M1170,260 L1170,280 L1150,280"/>
  </g>

  <!-- window dots -->
  <circle cx="52" cy="52" r="6" fill="#ff5f56"/>
  <circle cx="72" cy="52" r="6" fill="#ffbd2e"/>
  <circle cx="92" cy="52" r="6" fill="#27c93f"/>
  <text x="112" y="57" class="mono dim" font-size="13">~/arjun-singh — zsh</text>

  <!-- name -->
  <text x="600" y="128" text-anchor="middle" class="sans" font-size="52" font-weight="800" fill="url(#titleGrad)" filter="url(#softGlow)">
    Arjun Singh
  </text>

  <!-- animated underline sweep -->
  <rect x="470" y="140" width="0" height="3" rx="1.5" fill="url(#titleGrad)">
    <animate attributeName="width" values="0;260;260;0" keyTimes="0;0.35;0.7;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="470;470;470;600" keyTimes="0;0.35;0.7;1" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- typewriter role line -->
  <text x="600" y="178" text-anchor="middle" class="mono" font-size="19"
